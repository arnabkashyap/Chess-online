<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Chess</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col items-center justify-center font-sans">
    
    <div class="text-center mb-6">
        <h1 class="text-4xl font-bold text-amber-500 tracking-wider uppercase drop-shadow-lg">Element Chess</h1>
        <p class="text-gray-400 mt-2">Master the elements, conquer the board.</p>
    </div>

    <div class="flex flex-col md:flex-row gap-8 items-start justify-center w-full max-w-6xl px-4">
        
        <!-- Player 1 / Controls -->
        <div class="w-full md:w-64 bg-gray-800 p-4 rounded-xl shadow-xl border border-gray-700 flex flex-col items-center">
            <h2 class="text-xl font-bold mb-4 text-gray-200">Player (White)</h2>
            <div class="w-full mb-4">
                <label class="block text-sm text-gray-400 mb-1">Elemental Affinity</label>
                <select id="p1-element" class="w-full bg-gray-700 text-white p-2 rounded focus:outline-none focus:ring-2 focus:ring-amber-500">
                    <option value="none">None</option>
                    <option value="fire">Fire</option>
                    <option value="water">Water</option>
                </select>
            </div>
            <button id="p1-use-element" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded opacity-50 cursor-not-allowed transition-all" disabled>
                Use Element
            </button>
            <p id="p1-element-status" class="text-xs text-gray-500 mt-2 text-center">Select an element to begin</p>
        </div>

        <!-- Chess Board Container -->
        <div class="relative bg-gray-800 p-2 rounded-lg shadow-2xl border-4 border-amber-900/50">
            <!-- Ranks and Files could be added here, simplified for now -->
            <div id="board" class="board grid grid-cols-8 grid-rows-8 w-[400px] h-[400px] sm:w-[512px] sm:h-[512px] rounded overflow-hidden shadow-inner border-2 border-amber-950">
                <!-- Grid squares will be generated by JS -->
            </div>
            
            <!-- Game Over Overlay -->
            <div id="game-over-overlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center hidden rounded-lg z-50">
                <h2 id="game-over-text" class="text-3xl font-bold text-white mb-4 drop-shadow-md">Checkmate!</h2>
                <button id="restart-btn" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 px-6 rounded-full shadow-lg transition-transform hover:scale-105">
                    Play Again
                </button>
            </div>
        </div>

        <!-- Player 2 / Bot / Controls -->
        <div class="w-full md:w-64 bg-gray-800 p-4 rounded-xl shadow-xl border border-gray-700 flex flex-col items-center">
            <h2 class="text-xl font-bold mb-4 text-gray-200" id="p2-name">Opponent (Black)</h2>
            <div class="w-full mb-4">
                <label class="block text-sm text-gray-400 mb-1">Elemental Affinity</label>
                <select id="p2-element" class="w-full bg-gray-700 text-white p-2 rounded focus:outline-none focus:ring-2 focus:ring-amber-500">
                    <option value="none">None</option>
                    <option value="fire">Fire</option>
                    <option value="water">Water</option>
                </select>
            </div>
            <button id="p2-use-element" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded opacity-50 cursor-not-allowed transition-all" disabled>
                Use Element
            </button>
            <p id="p2-element-status" class="text-xs text-gray-500 mt-2 text-center">Select an element to begin</p>
            
            <div class="mt-8 w-full">
                <h3 class="text-sm font-bold text-gray-400 mb-2 border-b border-gray-700 pb-1">Game Mode</h3>
                <select id="game-mode" class="w-full bg-gray-700 text-white p-2 rounded focus:outline-none focus:ring-2 focus:ring-amber-500 mb-2">
                    <option value="local">Local PvP</option>
                    <option value="bot">Play vs Bot</option>
                    <option value="multiplayer">Multiplayer</option>
                </select>
                <div id="multiplayer-controls" class="hidden flex-col gap-2 w-full mt-2">
                    <button id="create-room-btn" class="bg-gray-600 hover:bg-gray-500 text-white py-1 px-2 rounded text-sm w-full">Create Room</button>
                    <div class="flex gap-1 w-full">
                        <input type="text" id="room-code-input" placeholder="Code" class="bg-gray-700 text-white px-2 py-1 rounded w-full text-sm text-center font-mono">
                        <button id="join-room-btn" class="bg-green-600 hover:bg-green-500 text-white py-1 px-3 rounded text-sm">Join</button>
                    </div>
                    <p id="room-status" class="text-xs text-amber-400 text-center mt-1"></p>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/elements.js"></script>
    <script src="js/game.js"></script>
    <script src="js/bot.js"></script>
    <script src="js/socket.js"></script>
</body>
</html>
